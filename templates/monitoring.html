<!DOCTYPE html>
<html>
<head>
    <title>실시간 모니터링</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #video-feed { cursor: crosshair; border-radius: 8px; width: 100%; }
        .log-container { height: 400px; overflow-y: auto; background: #f8f9fa; padding: 10px; border: 1px solid #ddd; }
        .signal-box { height: 100px; font-size: 24px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">실시간 관제 시스템</span>
            <a href="/" class="btn btn-outline-light btn-sm">로그아웃</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-white">실시간 영상 분석</div>
                    <div class="card-body p-0">
                        <img id="video-feed" src="/video_feed" onclick="getCoordinates(event)">
                    </div>
                </div>
                
                <div id="admin-panel" class="mt-3 p-3 bg-white border rounded shadow-sm">
                    <h6 class="text-primary">ROI 설정 (관리자전용)</h6>
                    <small class="text-muted">이미지를 4번 클릭하여 위반 감지 구역을 설정하세요.</small>
                    <div class="mt-2">
                        좌표: <span id="coord-display" class="badge bg-secondary">없음</span>
                        <button class="btn btn-sm btn-danger float-end" onclick="resetROI()">초기화</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div id="signal-indicator" class="signal-box mb-3 shadow-sm">신호 대기 중...</div>
                <div class="card shadow-sm">
                    <div class="card-header bg-white">위반 탐지 로그</div>
                    <div id="violation-log" class="log-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let points = [];

        function getCoordinates(event) {
            const img = document.getElementById('video-feed');
            const rect = img.getBoundingClientRect();
            const x = Math.round((event.clientX - rect.left) * (img.naturalWidth / rect.width));
            const y = Math.round((event.clientY - rect.top) * (img.naturalHeight / rect.height));

            points.push([x, y]);
            document.getElementById('coord-display').innerText = JSON.stringify(points);

            if (points.length === 4) {
                fetch('/set_roi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ points: points })
                }).then(() => {
                    alert("ROI 설정 완료");
                    points = [];
                });
            }
        }

        function resetROI() {
            points = [];
            fetch('/set_roi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ points: [] })
            });
            document.getElementById('coord-display').innerText = "초기화됨";
        }

        setInterval(() => {
            fetch('/get_status')
                .then(res => res.json())
                .then(data => {
                    const logDiv = document.getElementById('violation-log');
                    logDiv.innerHTML = data.logs.slice().reverse().map(l => `<div class="alert alert-danger p-2 mb-1" style="font-size:0.85rem">${l}</div>`).join('');
                    
                    const sigBox = document.getElementById('signal-indicator');
                    sigBox.innerText = data.signal === "RED" ? "🛑 RED (정지)" : "🟢 GREEN (주행)";
                    sigBox.style.backgroundColor = data.signal === "RED" ? "#dc3545" : "#198754";
                });
        }, 1000);
    </script>
</body>
</html>
